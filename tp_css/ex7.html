<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Animation - Exercice 7</title>
    <style>
        /* 1. On utilise une police avec empattement (serif) comme sur l'image */
        body {
            font-family: 'Times New Roman', Times, serif;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* Lien de retour discret en haut à gauche */
        .back-link {
            display: block;
            margin-bottom: 25px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }

        /* Titre exact : gras et gros */
        h1 {
            font-size: 36px;
            font-weight: bold;
            margin: 0 0 30px 0;
        }

        /* --- LE BOUTON --- */
        /* Fond gris très clair, bordure fine, coins légèrement arrondis */
        button {
            padding: 15px 25px;
            font-size: 18px;
            font-family: inherit; /* Utilise la police serif du body */
            background-color: #f0f0f0;
            border: 1px solid #7a7a7a;
            border-radius: 4px;
            cursor: pointer;
            display: block;
            margin-bottom: 25px;
            /* Transition douce au survol */
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #e0e0e0;
        }

        /* --- LE SPINNER --- */
        /* Anneau épais (8px) avec partie noire (border-top) */
        .spinner {
            border: 8px solid #8c8c8c; /* Couleur grise de base de l'anneau */
            border-top: 8px solid #000000; /* Partie noire qui tourne */
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: block;
            /* Appelle l'animation 'spin' qui dure 1 seconde et tourne en boucle */
            animation: spin 1s linear infinite;
        }

        /* Définition du mouvement de rotation */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-link">← Retour au menu</a>

    <h1>Animation</h1>

    <button>Hover me</button>

    <div class="spinner"></div>

</body>
</html>
